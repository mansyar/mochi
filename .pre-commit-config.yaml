repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.0
    hooks:
      - id: ruff
        args: [ --fix ]
      - id: ruff-format
  - repo: local
    hooks:
      - id: check-file-length
        name: Check file length (< 500 lines)
        entry: python scripts/check_file_length.py
        language: system
        types: [python]
      - id: test-coverage
        name: Test coverage threshold
        entry: uv run pytest --cov-fail-under=80
        language: system
        pass_filenames: false
        stages: [pre-push]
